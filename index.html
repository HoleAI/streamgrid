<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Grid</title>
    <link rel="stylesheet" href="index.css?v=11">
    <meta name="description" content="Piattaforma di streaming per canali TV sportivi e d'intrattenimento.">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    
    <!-- iOS support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stream Grid">
    <link rel="apple-touch-icon" href="stream-in-colorado.jpg">
</head>
<body>
    <div id="app">
        <header class="navbar glass">
            <div class="logo">Stream Grid</div>
            <button id="install-btn" class="install-btn glass" style="display: none;">📱 Installa App</button>
        </header>

        <main class="max-w-7xl mx-auto">
            <section id="normal-section">
                <h2 class="section-title">Canali Standard</h2>
                <div id="normal-grid" class="channel-grid"></div>
            </section>

            <section id="fast-section" style="display: none;">
                <h2 class="section-title">Canali Fast</h2>
                <div id="fast-grid" class="channel-grid"></div>
            </section>

            <section id="digitale-section">
                <h2 class="section-title">Digitale 🌍</h2>
                <div id="digitale-grid" class="channel-grid"></div>
            </section>
            
            <div style="text-align: center; margin-top: 3rem; padding-bottom: 2rem;">
                <a href="tutorial.html" style="color: #888; text-decoration: none; font-size: 0.85rem;">📖 Vai al Tutorial</a>
            </div>
        </main>
    </div>

    <script>
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('install-btn');
            if(installBtn) {
                installBtn.style.display = 'block';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const installBtn = document.getElementById('install-btn');
            if(installBtn) {
                installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            deferredPrompt = null;
                            installBtn.style.display = 'none';
                        }
                    }
                });
            }
        });

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registered!', reg);
                }).catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }

        const fastChannels = [
            {"id": 1, "name": "Canale D 📍", "streams": ["5", "92", "136"]},
            {"id": 2, "name": "Canale C ⚽️", "streams": ["1", "134"]},
            {"id": 3, "name": "Canale UNO ✨", "streams": ["130", "170"]}
        ];

        const normalChannels = [
            {"id": 4, "name": "Canale D 📍", "url": "https://lovetier.bz/player/zonaDAZN"},
            {"id": 5, "name": "Canale C ⚽️", "url": "https://lovetier.bz/player/SkySportCalcioIT"},
            {"id": 6, "name": "Canale Uno ✨", "url": "https://lovetier.bz/player/SkySportUnoIT"},
            {"id": 7, "name": "Canale T 🥎", "url": "https://lovetier.bz/player/SkySportTennisIT"},
            {"id": 8, "name": "Canale 24 📰", "url": "https://lovetier.bz/player/SkySport24IT"},
            {"id": 9, "name": "Canale E1 🥇", "url": "https://lovetier.bz/player/euro1it"},
            {"id": 10, "name": "Canale E2 🥈", "url": "https://lovetier.bz/player/euro2it"},
            {"id": 11, "name": "Canale B 🏀", "url": "https://lovetier.bz/player/SkySportNBAIT"},
            {"id": 13, "name": "Canale F1 🏎️", "url": "https://lovetier.bz/player/SkySportF1IT"},
            {"id": 14, "name": "Canale Arena ⚔️", "url": "https://lovetier.bz/player/SkySportArenaIT"}
        ];

        const digitaleChannels = [
            {"id": 1, "name": "Rai 1 HD", "url": "https://dash2.antik.sk/live/test_rai_uno_tizen/playlist.m3u8"},
            {"id": 2, "name": "Rai 2 HD", "urls": ["https://d3k8wzt41aflvx.cloudfront.net/RAI2/Live.m3u8", "https://juventusonair.com/lv/ck/app/rai/tivusat/rai2.php"]},
            {"id": 3, "name": "Rai 3 HD", "url": "https://dash2.antik.sk/live/test_rai_tre_tizen/playlist.m3u8"},
            {"id": 5, "name": "Canale 5", "urls": ["https://lovetier.bz/player/Canale5", "https://juventusonair.com/lv/ck/app/mediaset/tivusat/5.php"]},
            {"id": 8, "name": "TV8", "url": "https://mytivu.it/Application/Channels/TV8.php"},
            {"id": 9, "name": "Nove", "url": "https://mytivu.it/Application/Channels/Nove.php"},
            {"id": 52, "name": "DMAX", "url": "https://mytivu.it/Application/Channels/Dmax.php"},
            {"id": 58, "name": "Rai Sport", "url": "https://d3k8wzt41aflvx.cloudfront.net/RAI2/Live.m3u8"},
            {"id": 60, "name": "Sportitalia", "url": "https://edge-001.streamup.eu/sportitalia/sihd_abr/playlist.m3u8"},
            {"id": 64, "name": "SuperTennis", "url": "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8"},
            {"id": 99, "name": "Rai 2 Test Provider", "url": "https://juventusonair.com/lv/ck/app/rai/tivusat/rai2.php"},
            {"id": 100, "name": "RSI LA 2", "url": "https://juventusonair.com/lv/ck/app/rsi/rsila2.php"}
        ];

        function renderChannels() {
            const fastGrid = document.getElementById('fast-grid');
            const normalGrid = document.getElementById('normal-grid');
            const digitaleGrid = document.getElementById('digitale-grid');

            fastGrid.innerHTML = fastChannels.map(ch => `
                <div class="channel-card fade-in" onclick="window.location.href='player.html?v=1&type=fast&id=${ch.id}'">
                    <div class="channel-name">${ch.name}</div>
                </div>
            `).join('');

            normalGrid.innerHTML = normalChannels.map(ch => `
                <div class="channel-card fade-in" onclick="window.location.href='player.html?v=1&type=normal&id=${ch.id}'">
                    <div class="channel-name">${ch.name}</div>
                </div>
            `).join('');

            digitaleGrid.innerHTML = digitaleChannels.map(ch => {
                if (ch.id === 100) {
                    return `
                        <div class="channel-card fade-in" onclick="window.open('https://juventusonair.com/channels/rsila2z.php', '_blank')">
                            <div class="channel-name">${ch.name} <span style="font-size: 0.85em; margin-left: 5px;">🔗</span></div>
                        </div>
                    `;
                }
                return `
                    <div class="channel-card fade-in" onclick="window.location.href='player.html?v=1&type=digitale&id=${ch.id}'">
                        <div class="channel-name">${ch.name}</div>
                    </div>
                `;
            }).join('');
        }

        // Initialize
        renderChannels();

        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                nav.style.padding = '0.75rem 2rem';
                nav.style.background = 'rgba(10, 10, 12, 0.9)';
            } else {
                nav.style.padding = '1rem 2rem';
                nav.style.background = 'var(--bg-glass)';
            }
        });
    </script>
</body>
</html>
