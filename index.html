<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamGrid</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white">
    <div id="app"></div>

    <script>
        const fastChannels = [
            {"id": 1, "name": "Canale D 📍", "url": "https://mediahosting.space/embed/player?stream=5&no_register=true"},
            {"id": 2, "name": "Canale C ⚽️", "url": "https://mediahosting.space/embed/player?stream=1&no_register=true"},
            {"id": 3, "name": "Canale UNO ✨", "url": "https://mediahosting.space/embed/player?stream=170&no_register=true"},
            {"id": 8, "name": "Canale C (Riserva) ⚽️", "url": "https://mediahosting.space/embed/player?stream=134&no_register=true"},
            {"id": 9, "name": "Canale D (Riserva) 📍", "url": "https://mediahosting.space/embed/player?stream=136&no_register=true"}
        ];

        const normalChannels = [
            {"id": 4, "name": "Canale D 📍", "url": "https://lovetier.bz/player/zonaDAZN"},
            {"id": 5, "name": "Canale C ⚽️", "url": "https://lovetier.bz/player/SkySportCalcioIT"},
            {"id": 6, "name": "Canale Uno ✨", "url": "https://lovetier.bz/player/SkySportUnoIT"},
            {"id": 7, "name": "Canale T 🥎", "url": "https://lovetier.bz/player/SkySportTennisIT"},
            {"id": 8, "name": "Canale 24 📰", "url": "https://lovetier.bz/player/SkySport24IT"},
            {"id": 9, "name": "Canale E1 🥇", "url": "https://lovetier.bz/player/euro1it"},
            {"id": 10, "name": "Canale E2 🥈", "url": "https://lovetier.bz/player/euro2it"},
            {"id": 11, "name": "Canale B ", "url": "https://lovetier.bz/player/SkySportBasketIT"}
        ];

        function renderHome() {
            document.getElementById('app').innerHTML = `
                <div class="max-w-6xl mx-auto p-4">
                    <h1 class="text-3xl font-bold mb-6">StreamGrid</h1>
                    <div class="space-y-6">
                        <div>
                            <h2 class="text-xl font-semibold mb-4">Fast</h2>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                ${fastChannels.map(ch => `
                                    <div class="bg-gray-800 rounded-lg p-4 hover:bg-gray-700 cursor-pointer transition-colors" onclick="showPlayer(${ch.id}, 'fast')">
                                        <h2 class="font-semibold">${ch.name}</h2>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div>
                            <h2 class="text-xl font-semibold mb-4 flex items-center justify-between">
                            <span>Normal</span>
                            <a href="tutorial.html" class="text-blue-400 hover:text-blue-300 underline" target="_blank">📖 Tutorial</a>
                        </h2>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                ${normalChannels.map(ch => `
                                    <div class="bg-gray-800 rounded-lg p-4 hover:bg-gray-700 cursor-pointer transition-colors" onclick="showPlayer(${ch.id}, 'normal')">
                                        <h2 class="font-semibold">${ch.name}</h2>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function showPlayer(id, category) {
            const channels = category === 'fast' ? fastChannels : normalChannels;
            const channel = channels.find(c => c.id === id);
            document.getElementById('app').innerHTML = `
                <div class="fixed inset-0 bg-black flex items-center justify-center z-50">
                    <div class="relative w-full max-w-6xl h-[80vh]">
                        <iframe src="${channel.url}" class="w-full h-full rounded-lg" allowfullscreen style="aspect-ratio: 16 / 9;"></iframe>
                    </div>
                    <button onclick="renderHome()" class="absolute top-[18%] left-4 text-gray-400 hover:text-gray-200 text-4xl z-[60]">
                        ←
                    </button>
                </div>
            `;
        }

        // Initialize
        renderHome();
    </script>
</body>
</html>
