<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Grid | Player</title>
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="index.css?v=11">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="stream-in-colorado.jpg">

    <!-- HLS.js Library -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
</head>
<body style="background: #000; overflow: hidden;">
    <div id="player-page" class="player-overlay">
        <div class="player-header">
        <button onclick="window.location.href='index.html'" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        
        <div id="modal-stream-selector" class="stream-selector"></div>
        
        <div style="width: 40px; height: 40px; display: flex; justify-content: center; align-items: center;">
            <button id="refresh-btn" class="back-btn" style="display: none;" onclick="refreshPlayer()" title="Ricarica Player">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
            </button>
        </div>
    </div>
        
        <div class="video-box">
            <div id="iframe-wrapper" class="iframe-container">
                <iframe id="main-player" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
            </div>
            <div id="video-wrapper" class="iframe-container" style="display: none;">
                <video id="video-player" controls autoplay playsinline style="width: 100%; height: 100%; border: none; display: block; background: #000;"></video>
            </div>
        </div>
    </div>

    <script>
        const STREAM_TOKEN = "aN7QrmHIoz60HOhI";
        const fastChannels = [
            {"id": 1, "name": "Canale D 📍", "streams": ["5", "92", "136"]},
            {"id": 2, "name": "Canale C ⚽️", "streams": ["1", "134"]},
            {"id": 3, "name": "Canale UNO ✨", "streams": ["130", "170"]}
        ];
        const normalChannels = [
            {"id": 4, "name": "Canale D 📍", "url": "https://lovetier.bz/player/zonaDAZN"},
            {"id": 5, "name": "Canale C ⚽️", "url": "https://lovetier.bz/player/SkySportCalcioIT"},
            {"id": 6, "name": "Canale Uno ✨", "url": "https://lovetier.bz/player/SkySportUnoIT"},
            {"id": 7, "name": "Canale T 🥎", "url": "https://lovetier.bz/player/SkySportTennisIT"},
            {"id": 8, "name": "Canale 24 📰", "url": "https://lovetier.bz/player/SkySport24IT"},
            {"id": 9, "name": "Canale E1 🥇", "url": "https://lovetier.bz/player/euro1it"},
            {"id": 10, "name": "Canale E2 🥈", "url": "https://lovetier.bz/player/euro2it"},
            {"id": 11, "name": "Canale B 🏀", "url": "https://lovetier.bz/player/SkySportNBAIT"},
            {"id": 13, "name": "Canale F1 🏎️", "url": "https://lovetier.bz/player/SkySportF1IT"},
            {"id": 14, "name": "Canale Arena ⚔️", "url": "https://lovetier.bz/player/SkySportArenaIT"}
        ];

        const digitaleChannels = [
            {"id": 1, "name": "Rai 1 HD", "url": "https://juventusonair.com/lv/ck/app/rai/tivusat/rai1.php"},
            {"id": 2, "name": "Rai 2 HD", "url": "https://juventusonair.com/lv/ck/app/rai/tivusat/rai2.php"},
            {"id": 3, "name": "Rai 3 HD", "url": "https://juventusonair.com/lv/ck/app/rai/tivusat/rai3.php"},
            {"id": 5, "name": "Canale 5", "urls": ["https://juventusonair.com/lv/ck/app/mediaset/tivusat/5.php", "https://lovetier.bz/player/Canale5"]},
            {"id": 8, "name": "TV8", "urls": ["https://lovetier.bz/player/Tv8", "https://juventusonair.com/lv/ck/app/sky/tv8.php"]},
            {"id": 9, "name": "Nove", "urls": ["https://lovetier.bz/player/Nove", "https://juventusonair.com/lv/ck/app/discovery/nove.php"]},
            {"id": 52, "name": "DMAX", "urls": ["https://lovetier.bz/player/Dmax", "https://juventusonair.com/lv/ck/app/discovery/dmax.php"]},
            {"id": 58, "name": "Rai Sport", "url": "https://d3k8wzt41aflvx.cloudfront.net/RAI2/Live.m3u8"},
            {"id": 60, "name": "Sportitalia", "url": "https://edge-001.streamup.eu/sportitalia/sihd_abr/playlist.m3u8"},
            {"id": 64, "name": "SuperTennis", "url": "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8"},
            {"id": 100, "name": "RSI LA 2", "url": "https://juventusonair.com/lv/ck/app/rsi/rsila2.php"}
        ];

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        function refreshPlayer() {
            const player = document.getElementById('main-player');
            const currentSrc = player.src;
            player.src = '';
            setTimeout(() => { player.src = currentSrc; }, 100);
        }

        function updateStream(channel, index) {
            const streamId = channel.streams[index];
            let url = isMobile() 
                ? `https://1nyaler.streamhostingcdn.top/stream/${streamId}/index.m3u8?token=${STREAM_TOKEN}`
                : `https://mediahosting.space/embed/player?stream=${streamId}&token=${STREAM_TOKEN}&no_register=true`;
            
            document.getElementById('main-player').src = url;

            const selector = document.getElementById('modal-stream-selector');
            if (channel.streams && channel.streams.length > 1) {
                selector.style.display = 'flex';
                selector.innerHTML = channel.streams.map((_, i) => `<button onclick='updateStream(${JSON.stringify(channel)}, ${i})' class="selector-btn ${i === index ? 'active' : ''}">${i + 1}</button>`).join('');
            } else {
                selector.style.display = 'none';
            }
        }
        function updateDigitaleStream(channel, index) {
            const streamUrls = channel.urls || [channel.url];
            const streamUrl = streamUrls[index];

            const selector = document.getElementById('modal-stream-selector');
            if (streamUrls.length > 1) {
                selector.style.display = 'flex';
                selector.innerHTML = streamUrls.map((_, i) => `<button onclick='updateDigitaleStream(${JSON.stringify(channel)}, ${i})' class="selector-btn ${i === index ? 'active' : ''}">${i + 1}</button>`).join('');
            } else {
                selector.style.display = 'none';
            }

            if ((streamUrl.includes('.m3u8') && !streamUrl.includes('.php')) || streamUrl.includes('mytivu.it')) {
                document.getElementById('iframe-wrapper').style.display = 'none';
                document.getElementById('video-wrapper').style.display = 'block';
                const video = document.getElementById('video-player');

                if (!window.plyrPlayer) {
                    window.plyrPlayer = new Plyr(video, { autoplay: true });
                }

                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        window.plyrPlayer.play().catch(e => console.log('Autoplay blocked: ', e));
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', function() {
                        window.plyrPlayer.play().catch(e => console.log('Autoplay blocked: ', e));
                    });
                }
            } else {
                document.getElementById('iframe-wrapper').style.display = 'block';
                document.getElementById('video-wrapper').style.display = 'none';
                const video = document.getElementById('video-player');
                video.pause();
                video.src = '';
                
                let finalUrl = streamUrl;
                if (streamUrl.includes('lovetier.bz')) {
                    const separator = streamUrl.includes('?') ? '&' : '?';
                    finalUrl = `${streamUrl}${separator}no_ads=1&ads=0&ad=0&advertising=0&banner=0&popup=0&disable_ads=true`;
                }
                document.getElementById('main-player').src = finalUrl;
            }
        }

        // Init based on URL
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const id = parseInt(params.get('id'));

        if (type === 'fast') {
            document.getElementById('refresh-btn').style.display = 'flex';
            const ch = fastChannels.find(c => c.id === id);
            if (ch) updateStream(ch, 0);
        } else if (type === 'normal') {
            const ch = normalChannels.find(c => c.id === id);
            if (ch) {
                const separator = ch.url.includes('?') ? '&' : '?';
                document.getElementById('main-player').src = `${ch.url}${separator}no_ads=1&ads=0&ad=0&advertising=0&banner=0&popup=0&disable_ads=true`;
                document.getElementById('modal-stream-selector').style.display = 'none';
            }
        } else if (type === 'digitale') {
            const ch = digitaleChannels.find(c => c.id === id);
            if (ch) {
                updateDigitaleStream(ch, 0);
            }
        }
    </script>
</body>
</html>
